<!DOCTYPE html>
<html>
<head>
    <title>Baseball Game</title>
</head>

<body style="background-color: bisque; font-family: Courier New; margin: 0; padding: 20px;">

    <section class="game-screen" style="padding: 20px;">
        <h1 id="game-title">A WILD PITCHER APPEARS</h1>

        <img id="player-img"
             src="https://cdn-icons-png.flaticon.com/512/5147/5147275.png"
             width="100"
             alt="Baseball Player">

        <p id="pitches-left"><b>10/10 PITCHES LEFT</b></p>

        <div id="bar" style="background-color: green; height: 20px; width: 100%;"></div>

        <ol id="menu">
            <li><button>SWING</button></li>
            <li>
                ITEM
                <select id="item-list">
                    <option>Energy Drink</option>
                    <option>Lucky Bat</option>
                    <option>Speed Shoes</option>
                </select>
            </li>
            <li><button>STEAL BASE</button></li>
            <li><button>RUN</button></li>
        </ol>
    </section>

</body>
</html>
