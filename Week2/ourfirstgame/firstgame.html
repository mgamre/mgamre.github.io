<!DOCTYPE html>
<html>
<head>
    <title>Baseball Game</title>
</head>

<body style="background-color: darkgreen; font-family: Courier New; margin:0; text-align:center;">

<!-- Screen 1 -->
<section class="start-screen" id="home" style="padding:30px;">

    <h1 id="title" style="color:white;">BASEBALL HOME RUN CHALLENGE</h1>

    <img id="stadium-img"
    src="https://images.unsplash.com/photo-1566577739112-5180d4bf9390?w=1200"
    width="700"
    style="border:6px solid white; border-radius:20px;">

    <br><br>

    <a id="start-btn" href="#game"
    style="background-color:white; color:darkgreen; padding:15px 40px; font-size:25px; text-decoration:none; border-radius:10px;">
    START
    </a>

</section>

<!-- Screen 2 -->
<section class="game-screen" id="game"
style="background-color:bisque; padding:30px; margin-top:50px;">

    <h2 id="pitcher-text">A WILD PITCHER APPEARS</h2>

    <img id="player-img"
    src="https://cdn-icons-png.flaticon.com/512/5147/5147275.png"
    width="100">

    <p id="pitches-left"><b>10/10 PITCHES LEFT</b></p>

    <div id="bar"
    style="background-color:green; height:20px; width:100%;"></div>

    <ol id="menu">
        <li><button>SWING</button></li>
        <li><button>BUNT</button></li>
        <li><button>STEAL BASE</button></li>
        <li><button>RUN</button></li>
    </ol>

</section>

</body>
</html>
