<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrath of the Raccoon</title>

    <style>
        body {
            background-color: #000000;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 500px;
            height: 750px;
            background-color: #e9e9e9;
            padding: 36px;
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
            margin: 40px auto;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            margin-bottom: 12px;
            border-radius: 6px;
            display: block;
        }

        .card h1 {
            font-family: Georgia, "Times New Roman", serif;
            color: #111111;
            font-size: 48px;
            margin-top: 0;
            margin-bottom: 16px;
        }

        .card p {
            font-size: 18px;
            color: #222222;
            margin-bottom: 18px;
        }

        .card ul {
            font-size: 18px;
            margin-bottom: 24px;
        }

        .card a {
            text-decoration: none;
        }

        .card button {
            background-color: #000000;
            color: white;
            border: none;
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        .card button:hover {
            background-color: #333333;
        }

        .card button:active {
            background-color: #555555;
            transform: scale(0.98);
        }

        .card a:hover button {
            background-color: #1f1f1f;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://cdn.pixabay.com/photo/2019/08/01/12/19/raccoon-4377383_1280.jpg" alt="Raccoon">

        <h1>Wrath of the Raccoon</h1>

        <p>
            Summon up to 4 raccoons with 2d6 hp that can take the following actions on your turn:
        </p>

        <ul>
            <li>1d4 damage</li>
            <li>Can attempt to steal if within 10ft of a target</li>
            <li>Can inflict rabies</li>
        </ul>

        <a href="https://magic.wizards.com/en" target="_blank">
            <button>Wizards of the Coast, call me</button>
        </a>
    </div>
</body>
</html>
